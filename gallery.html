<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Gordon "Rookie" Reardon Archive</title>
    <meta name="description" content="Image gallery of Gordon 'Rookie' Reardon's basketball career.">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* ---- Gallery specific styles ---- */
        body {
            background: #f2f0eb;
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            color: #1e1e1e;
            margin: 0;
            padding: 0;
        }

        .gallery-page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
        }

        .gallery-header {
            text-align: center;
            padding: 1.5rem 0 2.5rem;
        }

        .gallery-header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #1f3a4b;
            margin-bottom: 0.3rem;
        }

        .gallery-header p {
            color: #5e6f7e;
            font-size: 1.1rem;
            font-weight: 300;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #a43326;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        /* ---- Year filter / navigation ---- */
        .year-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
        }
        .year-nav a {
            background: #e8e3da;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            text-decoration: none;
            color: #1f3a4b;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
        }
        .year-nav a:hover,
        .year-nav a.active {
            background: #a43326;
            color: white;
        }

        /* ---- Gallery grid ---- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.25rem;
        }

        .gallery-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.15);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #e8e3da;
            transition: opacity 0.2s;
        }

        .gallery-item:hover img {
            opacity: 0.92;
        }

        .gallery-item .caption {
            padding: 0.7rem 0.9rem 0.9rem;
            font-size: 0.8rem;
            color: #4a5b68;
            background: white;
            border-top: 1px solid #f0ede7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gallery-item .caption .year-tag {
            background: #1f3a4b;
            color: white;
            padding: 0.1rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .gallery-item .caption .filename {
            font-size: 0.7rem;
            color: #888;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ---- Lightbox / modal ---- */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            cursor: zoom-out;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.25s ease;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 92vw;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            animation: scaleIn 0.3s ease;
            background: #111;
        }

        .lightbox .close-btn {
            position: absolute;
            top: 1.8rem;
            right: 2.5rem;
            color: white;
            font-size: 2.8rem;
            font-weight: 300;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            background: none;
            border: none;
            font-family: 'Georgia', serif;
            line-height: 1;
        }
        .lightbox .close-btn:hover {
            opacity: 1;
        }

        .lightbox .lightbox-info {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.4rem 1.4rem;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.92); opacity: 0.6; }
            to { transform: scale(1); opacity: 1; }
        }

        /* ---- Responsive ---- */
        @media (max-width: 700px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 0.9rem;
            }
            .gallery-item img {
                height: 150px;
            }
            .gallery-header h1 {
                font-size: 2rem;
            }
            .lightbox {
                padding: 1rem;
            }
            .lightbox .close-btn {
                top: 1rem;
                right: 1.2rem;
                font-size: 2.2rem;
            }
            .lightbox .lightbox-info {
                font-size: 0.7rem;
                padding: 0.3rem 1rem;
                bottom: 1.2rem;
            }
        }

        @media (max-width: 450px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 0.6rem;
            }
            .gallery-item img {
                height: 120px;
            }
            .gallery-item .caption {
                font-size: 0.7rem;
                padding: 0.4rem 0.6rem;
                flex-wrap: wrap;
                gap: 0.2rem;
            }
        }

        /* no-image placeholder style */
        .gallery-item .no-img {
            height: 200px;
            background: #e8e3da;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <div class="gallery-page">

        <!-- Header -->
        <div class="gallery-header">
            <a href="index.html" class="back-link">← Back to Archive</a>
            <h1>📸 Image Gallery</h1>
            <p>Gordon "Rookie" Reardon — career in pictures</p>
        </div>

        <!-- Year Navigation -->
        <div class="year-nav">
            <a href="#" class="active" data-year="all">All</a>
            <a href="#" data-year="1971">1971</a>
            <a href="#" data-year="1972">1972</a>
            <a href="#" data-year="1973">1973</a>
            <a href="#" data-year="1974">1974</a>
            <a href="#" data-year="1975">1975</a>
            <a href="#" data-year="1976">1976</a>
            <a href="#" data-year="1977">1977</a>
            <a href="#" data-year="1978">1978</a>
            <a href="#" data-year="1980">1980</a>
            <a href="#" data-year="1984">1984</a>
            <a href="#" data-year="1985">1985</a>
            <a href="#" data-year="1986">1986</a>
            <a href="#" data-year="1987">1987</a>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="galleryGrid"></div>

        <!-- Count / info -->
        <p style="text-align:center; margin-top:2rem; color:#7a8a98; font-size:0.9rem;" id="imageCount"></p>
    </div>

    <!-- Lightbox / Modal -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
        <button class="close-btn" id="closeLightbox" aria-label="Close full-size view">✕</button>
        <img id="lightboxImg" src="" alt="Full size image">
        <div class="lightbox-info" id="lightboxInfo">Click anywhere to close</div>
    </div>

    <script>
        (function() {
            // -------- ALL IMAGES (built from your directory structure) --------
            const imageData = [
                // 1971
                { year: 1971, file: 'Rookie1971April17.png' },
                { year: 1971, file: 'Rookie1971Aug12.png' },
                { year: 1971, file: 'Rookie1971Aug14.png' },
                { year: 1971, file: 'Rookie1971Aug16.png' },
                { year: 1971, file: 'Rookie1971Aug18.png' },
                { year: 1971, file: 'Rookie1971July14.png' },
                { year: 1971, file: 'Rookie1971July16.png' },
                { year: 1971, file: 'Rookie1971June29.jpg' },
                { year: 1971, file: 'Rookie1971June29.png' },
                // 1972
                { year: 1972, file: 'Rookie1972April28.png' },
                { year: 1972, file: 'Rookie1972Aug26.png' },
                { year: 1972, file: 'Rookie1972Aug31.png' },
                { year: 1972, file: 'Rookie1972July10.png' },
                { year: 1972, file: 'Rookie1972July15.png' },
                { year: 1972, file: 'Rookie1972July8.png' },
                { year: 1972, file: 'Rookie1972June12.png' },
                { year: 1972, file: 'Rookie1972June17.png' },
                { year: 1972, file: 'Rookie1972May2.png' },
                { year: 1972, file: 'Rookie1972May29.png' },
                // 1973
                { year: 1973, file: 'Rookie1973June20.png' },
                { year: 1973, file: 'Rookie1973June27.png' },
                { year: 1973, file: 'Rookie1973May26.png' },
                { year: 1973, file: 'Rookie1973May29.png' },
                { year: 1973, file: 'Rookie1973May31.png' },
                // 1974
                { year: 1974, file: 'Rookie1974June3.png' },
                { year: 1974, file: 'Rookie1974May25.png' },
                { year: 1974, file: 'Rookie1974Sept17.png' },
                { year: 1974, file: 'Rookie1974Sept18.png' },
                { year: 1974, file: 'Rookie1974Sept23.png' },
                // 1975
                { year: 1975, file: 'Rookie1975Jan10Geoff_Reardon.png' },
                { year: 1975, file: 'Rookie1975Jan16.png' },
                { year: 1975, file: 'Rookie1975June3.png' },
                { year: 1975, file: 'Rookie1975Sept12.png' },
                { year: 1975, file: 'Rookie1975Sept15.png' },
                { year: 1975, file: 'Rookie1975Sept6.png' },
                // 1976
                { year: 1976, file: 'Rookie1976Feb24.png' },
                { year: 1976, file: 'Rookie1976Feb27.png' },
                { year: 1976, file: 'Rookie1976July8.png' },
                { year: 1976, file: 'Rookie1976Nov24.png' },
                { year: 1976, file: 'Rookie1976Oct13.png' },
                // 1977
                { year: 1977, file: 'Rookie1977Aug10.png' },
                { year: 1977, file: 'Rookie1977Aug11.png' },
                { year: 1977, file: 'Rookie1977Aug12.png' },
                { year: 1977, file: 'Rookie1977Dec13.png' },
                { year: 1977, file: 'Rookie1977July12.png' },
                { year: 1977, file: 'Rookie1977June11.png' },
                { year: 1977, file: 'Rookie1977June2.png' },
                { year: 1977, file: 'Rookie1977June6.png' },
                { year: 1977, file: 'Rookie1977June7.png' },
                { year: 1977, file: 'Rookie1977Sept10.png' },
                { year: 1977, file: 'Rookie1977Sept12.png' },
                { year: 1977, file: 'Rookie1977Sept3.png' },
                { year: 1977, file: 'Rookie1977Sept8.png' },
                // 1978
                { year: 1978, file: 'Rookie1978April10.png' },
                { year: 1978, file: 'Rookie1978April19.png' },
                { year: 1978, file: 'Rookie1978April3.png' },
                { year: 1978, file: 'Rookie1978Jan19.png' },
                { year: 1978, file: 'Rookie1978Jan20.png' },
                { year: 1978, file: 'Rookie1978July14.png' },
                { year: 1978, file: 'Rookie1978July26.png' },
                { year: 1978, file: 'Rookie1978June16.png' },
                { year: 1978, file: 'Rookie1978June17.png' },
                { year: 1978, file: 'Rookie1978June9.png' },
                { year: 1978, file: 'Rookie1978March11.png' },
                { year: 1978, file: 'Rookie1978March28.png' },
                { year: 1978, file: 'Rookie1978Sept8.png' },
                // 1980
                { year: 1980, file: 'Rookie1980Sept15.png' },
                // 1984
                { year: 1984, file: 'Rookie1984April28.png' },
                { year: 1984, file: 'Rookie1984May18.png' },
                // 1985
                { year: 1985, file: 'Rookie1985April27.png' },
                // 1986
                { year: 1986, file: 'Rookie1986July14.png' },
                { year: 1986, file: 'Rookie1986June2.png' },
                { year: 1986, file: 'Rookie1986June26.png' },
                { year: 1986, file: 'Rookie1986May19.png' },
                { year: 1986, file: 'Rookie1986Nov19.png' },
                // 1987
                { year: 1987, file: 'Rookie1987March6.png' }
            ];

            // -------- helpers --------
            function getImagePath(year, file) {
                return `assets/images/years/${year}/${file}`;
            }

            function getDisplayName(file) {
                // remove "Rookie" and year prefix, clean up
                let name = file.replace(/^Rookie\d{4}/, '').replace(/\.(png|jpg|jpeg)$/i, '');
                // capitalize and add spaces
                name = name.replace(/([A-Z])/g, ' $1').trim();
                return name || file;
            }

            // -------- render gallery --------
            const grid = document.getElementById('galleryGrid');
            const countEl = document.getElementById('imageCount');

            function renderGallery(filterYear) {
                let filtered = imageData;
                if (filterYear && filterYear !== 'all') {
                    filtered = imageData.filter(item => item.year === parseInt(filterYear, 10));
                }

                if (filtered.length === 0) {
                    grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:3rem; color:#7a8a98;">No images found for this year.</p>`;
                    countEl.textContent = '0 images';
                    return;
                }

                let html = '';
                filtered.forEach(item => {
                    const path = getImagePath(item.year, item.file);
                    const label = getDisplayName(item.file);
                    html += `
                        <div class="gallery-item" data-year="${item.year}" data-full="${path}">
                            <img src="${path}" alt="${item.file}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling?.style?.setProperty('display','flex');">
                            <div class="no-img" style="display:none; height:200px; background:#e8e3da; align-items:center; justify-content:center; color:#999; font-size:0.8rem;">⚠️ image not found</div>
                            <div class="caption">
                                <span class="filename">${label}</span>
                                <span class="year-tag">${item.year}</span>
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML = html;
                countEl.textContent = `${filtered.length} image${filtered.length > 1 ? 's' : ''}`;

                // -------- click to open lightbox (full size) --------
                document.querySelectorAll('.gallery-item').forEach(item => {
                    item.addEventListener('click', function(e) {
                        const fullSrc = this.dataset.full;
                        if (fullSrc) {
                            openLightbox(fullSrc);
                        }
                    });
                });
            }

            // -------- lightbox --------
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const closeBtn = document.getElementById('closeLightbox');

            function openLightbox(src) {
                lightboxImg.src = src;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
                // show filename in info
                const parts = src.split('/');
                const fileName = parts[parts.length - 1];
                document.getElementById('lightboxInfo').textContent = fileName + '  ·  click to close';
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
                // small delay to clear src (prevents flash)
                setTimeout(() => { lightboxImg.src = ''; }, 300);
            }

            closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', function(e) {
                if (e.target === this) closeLightbox();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeLightbox();
            });

            // -------- year filter navigation --------
            const yearLinks = document.querySelectorAll('.year-nav a');
            yearLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    yearLinks.forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                    const year = this.dataset.year;
                    renderGallery(year);
                    // scroll to grid
                    grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            });

            // -------- initial render (All) --------
            renderGallery('all');

        })();
    </script>

</body>
</html>
