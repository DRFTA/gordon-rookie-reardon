    <meta charset="UTF-8">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* ---- Gallery specific styles ---- */
        body {
            background: #f2f0eb;
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            color: #1e1e1e;
            margin: 0;
            padding: 0;
        }

        .gallery-page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
        }

        .gallery-header {
            text-align: center;
            padding: 1.5rem 0 2.5rem;
        }

        .gallery-header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #1f3a4b;
            margin-bottom: 0.3rem;
        }

        .gallery-header p {
            color: #5e6f7e;
            font-size: 1.1rem;
            font-weight: 300;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #a43326;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        /* ---- Year filter / navigation ---- */
        .year-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
        }
        .year-nav a {
            background: #e8e3da;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            text-decoration: none;
            color: #1f3a4b;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
        }
        .year-nav a:hover,
        .year-nav a.active {
            background: #a43326;
            color: white;
        }

        /* ---- Gallery grid ---- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.25rem;
        }

        .gallery-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.15);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #e8e3da;
            transition: opacity 0.2s;
        }

        .gallery-item:hover img {
            opacity: 0.92;
        }

        .gallery-item .caption {
            padding: 0.7rem 0.9rem 0.9rem;
            font-size: 0.8rem;
            color: #4a5b68;
            background: white;
            border-top: 1px solid #f0ede7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gallery-item .caption .year-tag {
            background: #1f3a4b;
            color: white;
            padding: 0.1rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .gallery-item .caption .filename {
            font-size: 0.7rem;
            color: #888;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ---- Lightbox / modal with zoom ---- */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            cursor: default;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.25s ease;
            overflow: hidden;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-inner {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: grab;
        }

        .lightbox-inner:active {
            cursor: grabbing;
        }

        .lightbox-inner img {
            max-width: 92vw;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            animation: scaleIn 0.3s ease;
            background: #111;
            transition: none;
            transform-origin: center center;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: none;
            will-change: transform;
        }

        /* zoomed state */
        .lightbox-inner img.zoomed {
            cursor: grab;
            max-width: none;
            max-height: none;
            object-fit: none;
            border-radius: 0;
        }

        .lightbox-inner img.zoomed:active {
            cursor: grabbing;
        }

        .lightbox .close-btn {
            position: absolute;
            top: 1.8rem;
            right: 2.5rem;
            color: white;
            font-size: 2.8rem;
            font-weight: 300;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            background: none;
            border: none;
            font-family: 'Georgia', serif;
            line-height: 1;
            z-index: 10;
        }
        .lightbox .close-btn:hover {
            opacity: 1;
        }

        .lightbox-controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .lightbox-controls button {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.3rem 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s;
            min-width: 44px;
        }

        .lightbox-controls button:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .lightbox-controls .zoom-level {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            min-width: 45px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .lightbox-info {
            position: absolute;
            top: 1.8rem;
            left: 2.5rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            backdrop-filter: blur(2px);
            pointer-events: none;
            z-index: 10;
            font-family: 'Inter', sans-serif;
        }

        /* zoom hint - shows briefly */
        .zoom-hint {
            position: absolute;
            bottom: 5rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 5;
            white-space: nowrap;
        }

        .zoom-hint.show {
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.92); opacity: 0.6; }
            to { transform: scale(1); opacity: 1; }
        }

        /* ---- Responsive ---- */
        @media (max-width: 700px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 0.9rem;
            }
            .gallery-item img {
                height: 150px;
            }
            .gallery-header h1 {
                font-size: 2rem;
            }
            .lightbox {
                padding: 0.5rem;
            }
            .lightbox .close-btn {
                top: 1rem;
                right: 1rem;
                font-size: 2rem;
            }
            .lightbox-info {
                top: 1rem;
                left: 1rem;
                font-size: 0.7rem;
                padding: 0.2rem 0.7rem;
            }
            .lightbox-controls {
                bottom: 1rem;
                padding: 0.3rem 0.8rem;
                gap: 0.5rem;
            }
            .lightbox-controls button {
                padding: 0.2rem 0.6rem;
                font-size: 0.75rem;
                min-width: 36px;
            }
            .zoom-hint {
                bottom: 4rem;
                font-size: 0.65rem;
            }
        }

        @media (max-width: 450px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 0.6rem;
            }
            .gallery-item img {
                height: 120px;
            }
            .gallery-item .caption {
                font-size: 0.7rem;
                padding: 0.4rem 0.6rem;
                flex-wrap: wrap;
                gap: 0.2rem;
            }
        }

        /* no-image placeholder style */
        .gallery-item .no-img {
            height: 200px;
            background: #e8e3da;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.8rem;
        }
    </style>
</head>

                { year: 1984, file: 'Rookie1984April28.png' },
                { year: 1984, file: 'Rookie1984May18.png' },
                // 1985
                { year: 1985, file: 'Rookie1985April27.png' },
                // 1986
                { year: 1986, file: 'Rookie1986July14.png' },
                { year: 1986, file: 'Rookie1986June2.png' },
                { year: 1986, file: 'Rookie1986June26.png' },
                { year: 1986, file: 'Rookie1986May19.png' },
                { year: 1986, file: 'Rookie1986Nov19.png' },
                // 1987
                { year: 1987, file: 'Rookie1987March6.png' }
            ];

            // -------- helpers --------
            function getImagePath(year, file) {
                return `assets/images/years/${year}/${file}`;
            }

            function getDisplayName(file) {
                let name = file.replace(/^Rookie\d{4}/, '').replace(/\.(png|jpg|jpeg)$/i, '');
                name = name.replace(/([A-Z])/g, ' $1').trim();
                return name || file;
            }

            // -------- Zoom state --------
            let zoomState = {
                scale: 1,
                minScale: 1,
                maxScale: 5,
                translateX: 0,
                translateY: 0,
                isDragging: false,
                startX: 0,
                startY: 0,
                startTranslateX: 0,
                startTranslateY: 0,
                isZoomed: false
            };

            const img = document.getElementById('lightboxImg');
            const inner = document.getElementById('lightboxInner');
            const zoomLevel = document.getElementById('zoomLevel');
            const zoomHint = document.getElementById('zoomHint');

            function updateTransform() {
                const s = zoomState.scale;
                const tx = zoomState.translateX;
                const ty = zoomState.translateY;
                img.style.transform = `translate(${tx}px, ${ty}px) scale(${s})`;
                img.classList.toggle('zoomed', s > 1);
                zoomLevel.textContent = Math.round(s * 100) + '%';
                zoomState.isZoomed = s > 1;
            }

            function resetZoom() {
                zoomState.scale = 1;
                zoomState.translateX = 0;
                zoomState.translateY = 0;
                img.style.transform = '';
                img.classList.remove('zoomed');
                zoomLevel.textContent = '100%';
                zoomState.isZoomed = false;
            }

            function zoomIn() {
                let newScale = Math.min(zoomState.scale + 0.25, zoomState.maxScale);
                zoomState.scale = newScale;
                // if zooming in from 1, center the image
                if (Math.abs(zoomState.scale - 1) < 0.01) {
                    zoomState.translateX = 0;
                    zoomState.translateY = 0;
                }
                updateTransform();
                showZoomHint();
            }

            function zoomOut() {
                let newScale = Math.max(zoomState.scale - 0.25, zoomState.minScale);
                zoomState.scale = newScale;
                if (newScale <= 1) {
                    zoomState.translateX = 0;
                    zoomState.translateY = 0;
                }
                updateTransform();
                if (newScale <= 1) {
                    zoomLevel.textContent = '100%';
                }
                showZoomHint();
            }

            let hintTimeout = null;

            function showZoomHint() {
                zoomHint.classList.add('show');
                clearTimeout(hintTimeout);
                hintTimeout = setTimeout(() => {
                    zoomHint.classList.remove('show');
                }, 1500);
            }

            // -------- Drag/pan (mouse) --------
            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let dragStartTranslateX = 0;
            let dragStartTranslateY = 0;

            inner.addEventListener('mousedown', function(e) {
                if (zoomState.scale <= 1) return;
                isDragging = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                dragStartTranslateX = zoomState.translateX;
                dragStartTranslateY = zoomState.translateY;
                inner.style.cursor = 'grabbing';
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                const dx = e.clientX - dragStartX;
                const dy = e.clientY - dragStartY;
                zoomState.translateX = dragStartTranslateX + dx;
                zoomState.translateY = dragStartTranslateY + dy;
                updateTransform();
            });

            document.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    inner.style.cursor = zoomState.scale > 1 ? 'grab' : 'default';
                }
            });

            // -------- Drag/pan (touch) --------
            let touchStartX = 0;
            let touchStartY = 0;
            let touchStartTranslateX = 0;
            let touchStartTranslateY = 0;
            let lastTouchDist = 0;
            let isTouching = false;

            inner.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1 && zoomState.scale > 1) {
                    const t = e.touches[0];
                    touchStartX = t.clientX;
                    touchStartY = t.clientY;
                    touchStartTranslateX = zoomState.translateX;
                    touchStartTranslateY = zoomState.translateY;
                    isTouching = true;
                } else if (e.touches.length === 2) {
                    // pinch start
                    const t1 = e.touches[0];
                    const t2 = e.touches[1];
                    lastTouchDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                }
            }, { passive: true });

            inner.addEventListener('touchmove', function(e) {
                if (e.touches.length === 1 && isTouching && zoomState.scale > 1) {
                    const t = e.touches[0];
                    const dx = t.clientX - touchStartX;
                    const dy = t.clientY - touchStartY;
                    zoomState.translateX = touchStartTranslateX + dx;
                    zoomState.translateY = touchStartTranslateY + dy;
                    updateTransform();
                    e.preventDefault();
                } else if (e.touches.length === 2) {
                    // pinch to zoom
                    const t1 = e.touches[0];
                    const t2 = e.touches[1];
                    const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                    if (lastTouchDist > 0) {
                        const delta = dist - lastTouchDist;
                        const newScale = Math.min(Math.max(zoomState.scale + delta * 0.01, zoomState.minScale), zoomState
                            .maxScale);
                        zoomState.scale = newScale;
                        if (newScale <= 1) {
                            zoomState.translateX = 0;
                            zoomState.translateY = 0;
                        }
                        updateTransform();
                        showZoomHint();
                    }
                    lastTouchDist = dist;
                    e.preventDefault();
                }
            }, { passive: false });

            inner.addEventListener('touchend', function(e) {
                isTouching = false;
                lastTouchDist = 0;
                if (zoomState.scale <= 1) {
                    zoomState.translateX = 0;
                    zoomState.translateY = 0;
                    updateTransform();
                }
            }, { passive: true });

            // -------- Mouse wheel zoom --------
            inner.addEventListener('wheel', function(e) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                let newScale = Math.min(Math.max(zoomState.scale + delta, zoomState.minScale), zoomState.maxScale);
                zoomState.scale = newScale;
                if (newScale <= 1) {
                    zoomState.translateX = 0;
                    zoomState.translateY = 0;
                }
                updateTransform();
                showZoomHint();
            }, { passive: false });

            // -------- Double-click to reset --------
            img.addEventListener('dblclick', function(e) {
                resetZoom();
                showZoomHint();
                // briefly show hint
                setTimeout(() => {
                    zoomHint.classList.remove('show');
                }, 1200);
            });

            // -------- render gallery --------
            const grid = document.getElementById('galleryGrid');
            const countEl = document.getElementById('imageCount');

            function renderGallery(filterYear) {
                let filtered = imageData;
                if (filterYear && filterYear !== 'all') {
                    filtered = imageData.filter(item => item.year === parseInt(filterYear, 10));
                }

                if (filtered.length === 0) {
                    grid.innerHTML =
                        `<p style="grid-column:1/-1; text-align:center; padding:3rem; color:#7a8a98;">No images found for this year.</p>`;
                    countEl.textContent = '0 images';
                    return;
                }

                let html = '';
                filtered.forEach(item => {
                    const path = getImagePath(item.year, item.file);
                    const label = getDisplayName(item.file);
                    html += `
                        <div class="gallery-item" data-year="${item.year}" data-full="${path}">
                            <img src="${path}" alt="${item.file}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling?.style?.setProperty('display','flex');">
                            <div class="no-img" style="display:none; height:200px; background:#e8e3da; align-items:center; justify-content:center; color:#999; font-size:0.8rem;">⚠️ image not found</div>
                            <div class="caption">
                                <span class="filename">${label}</span>
                                <span class="year-tag">${item.year}</span>
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML = html;
                countEl.textContent = `${filtered.length} image${filtered.length > 1 ? 's' : ''}`;

                // -------- click to open lightbox (full size) --------
                document.querySelectorAll('.gallery-item').forEach(item => {
                    item.addEventListener('click', function(e) {
                        const fullSrc = this.dataset.full;
                        if (fullSrc) {
                            openLightbox(fullSrc);
                        }
                    });
                });
            }

            // -------- lightbox with zoom --------
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const closeBtn = document.getElementById('closeLightbox');
            const lightboxInfo = document.getElementById('lightboxInfo');

            function openLightbox(src) {
                resetZoom();
                lightboxImg.src = src;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';

                // Show filename
                const parts = src.split('/');
                const fileName = parts[parts.length - 1];
                lightboxInfo.textContent = fileName;

                // Reset zoom state
                zoomState.scale = 1;
                zoomState.translateX = 0;
                zoomState.translateY = 0;
                updateTransform();

                // Show zoom hint briefly
                setTimeout(() => {
                    zoomHint.classList.add('show');
                    setTimeout(() => {
                        zoomHint.classList.remove('show');
                    }, 2500);
                }, 400);
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
                resetZoom();
                setTimeout(() => { lightboxImg.src = ''; }, 300);
            }

            closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', function(e) {
                if (e.target === this || e.target === inner) {
                    // Only close if not dragging and not zoomed
                    if (zoomState.scale <= 1) {
                        closeLightbox();
                    } else {
                        // If zoomed, reset on background click
                        resetZoom();
                        showZoomHint();
                    }
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === '+' || e.key === '=') zoomIn();
                if (e.key === '-') zoomOut();
                if (e.key === 'r' || e.key === 'R') resetZoom();
            });

            // Zoom controls
            document.getElementById('zoomInBtn').addEventListener('click', zoomIn);
            document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);
            document.getElementById('resetZoomBtn').addEventListener('click', function() {
                resetZoom();
                showZoomHint();
            });

            // -------- year filter navigation --------
            const yearLinks = document.querySelectorAll('.year-nav a');
            yearLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    yearLinks.forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                    const year = this.dataset.year;
                    renderGallery(year);
                    grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            });

            // -------- initial render (All) --------
            renderGallery('all');

        })();
    </script>

</body>
</html>
